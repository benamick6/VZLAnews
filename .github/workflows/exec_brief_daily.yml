name: Build Executive Rapid Brief (Snappy)

on:
  schedule:
    - cron: "0 10 * * *"
    - cron: "0 11 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  exec-brief:
    runs-on: ubuntu-latest
    steps:
      - name: Check 6 AM ET window
        id: et_window
        shell: bash
        run: |
          ET_HOUR="$(TZ=America/New_York date +%H)"
          if [ "$ET_HOUR" = "06" ]; then
            echo "run_update=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_update=false" >> "$GITHUB_OUTPUT"
            echo "Skipping run outside 6 AM ET window (current ET hour: $ET_HOUR)."
          fi

      - uses: actions/checkout@v4
        if: github.event_name == 'workflow_dispatch' || steps.et_window.outputs.run_update == 'true'

      - uses: actions/setup-python@v5
        if: github.event_name == 'workflow_dispatch' || steps.et_window.outputs.run_update == 'true'
        with:
          python-version: "3.11"

      - name: Build executive rapid brief JSON
        if: github.event_name == 'workflow_dispatch' || steps.et_window.outputs.run_update == 'true'
        run: |
          python scripts/build_exec_brief_snappy.py

      - name: Commit updates
        if: github.event_name == 'workflow_dispatch' || steps.et_window.outputs.run_update == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add docs/data/exec_brief.json
          git commit -m "chore(data): update exec rapid brief" || exit 0
          git push