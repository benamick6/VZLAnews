name: Weekly RFP Collection

on:
  schedule:
    - cron: "0 10 * * *"
    - cron: "0 11 * * *"
  workflow_dispatch:        # Allow manual trigger

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Check 6 AM ET window
        id: et_window
        shell: bash
        run: |
          ET_HOUR="$(TZ=America/New_York date +%H)"
          if [ "$ET_HOUR" = "06" ]; then
            echo "run_update=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_update=false" >> "$GITHUB_OUTPUT"
            echo "Skipping run outside 6 AM ET window (current ET hour: $ET_HOUR)."
          fi

      - name: Checkout repository
        if: github.event_name == 'workflow_dispatch' || steps.et_window.outputs.run_update == 'true'
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        if: github.event_name == 'workflow_dispatch' || steps.et_window.outputs.run_update == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: github.event_name == 'workflow_dispatch' || steps.et_window.outputs.run_update == 'true'
        run: pip install -r requirements.txt

      - name: Run collection script
        if: github.event_name == 'workflow_dispatch' || steps.et_window.outputs.run_update == 'true'
        run: python scripts/collect_rfps.py

      - name: Verify docs/index.md contains app shell markers
        if: github.event_name == 'workflow_dispatch' || steps.et_window.outputs.run_update == 'true'
        run: |
          for marker in "VZLAnews Intelligence Platform" "id=\"app-root\"" "assets/app.js"; do
            if ! grep -q "$marker" docs/index.md; then
              echo "ERROR: docs/index.md is missing app shell marker: $marker"
              exit 1
            fi
          done
          echo "All app shell markers present in docs/index.md"

      - name: Commit changes (if any)
        if: github.event_name == 'workflow_dispatch' || steps.et_window.outputs.run_update == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.md docs/data/latest.json docs/data/diff.json docs/data/macros.json docs/data/highlights.json docs/data/rejected_links.json data/last_run.json data/latest_stories.json data/latest_stories.csv data/signal_history.json data/alerts.json data/intelligence_summary.json data/macro_indicators.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: weekly news intelligence update [skip ci]"
            git push
          fi
